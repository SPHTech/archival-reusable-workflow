name: "Deploy AWS Lambda Using Zip"

on:
  workflow_call:
    inputs:
      lambda_function_name:
        description: "Lambda name to be deployed"
        type: string
        required: true
      aws_account_region:
        description: "AWS account region"
        type: string
        required: true
      aws_iam_role_arn:
        description: "AWS ARN IAM Role"
        type: string
        required: true
      working_directory:
        description: "Working Directory of the project"
        type: string
        required: false
        default: "./"
      build_script_path:
        description: "Adding a build script path"
        type: string
        required: false
      local_build_path:
        description: " Add the local build path"
        type: string
        required: false
      lambda_environment_var:
        description: "AWS Lambda comma Separate list of environment variable"
        type: string
        required: false
      s3_bucket:
        description: "AWS S3 bucket where the lambda zip file is stored"
        type: string
        required: false
      s3_key:
        description: "AWS S3 key for the lambda zip"
        type: string
        required: false
      ecr_image_uri:
        description: "ECR Image URI to deploy to lambda"
        type: string
        required: false
      lambda_architecture:
        description: "AWS Lambda architecture"
        default: "x86_64"
        type: string
        required: false
      runner_label:
        description: "Add runners for the GHA"
        default: '["platform-eng-ent-v2-dual"]'
        type: string
        required: false
      dx_service_name:
        description: "Name of the service to register deployment to DX"
        required: false
        type: string
      dx_product_name:
        description: "Name of the product to register deployment to DX"
        required: false
        type: string
      dx_base_url:
        description: "DX base URL"
        required: false
        type: string
      need_to_register_deployment_to_dx:
        description: "Is it needed to register the deployment to DX"
        required: false
        default: false
        type: boolean
      environment:
        description: "Deployment Environment"
        required: false
        type: string
      dx_app_category:
        description: "DX app category"
        required: false
        type: string
    secrets:
      DX_API_TOKEN:
        description: "DX API Token"
        required: false

jobs:
  deploy-lambda:
    name: 🚀 Deploy to Lambda
    runs-on: ${{ fromJSON(inputs.runner_label) }}
    steps:
      - name: ⏳ Checkout
        uses: actions/checkout@v4

      - name: 🔩 Configure aws credentials
        id: aws-deploy-credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-skip-session-tagging: true
          role-to-assume: ${{ inputs.aws_iam_role_arn }}
          role-session-name: gh-actions
          aws-region: ${{ inputs.aws_account_region }}
          mask-aws-account-id: "no"

      - name: Install Python for installing AWS CLI
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        if: contains(inputs.runner_label, 'platform-eng-ent-v2-dual')

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          pip install awscli
        if: contains(inputs.runner_label, 'platform-eng-ent-v2-dual')

      - name: 🛠️ Build the Lambda
        if: ${{ inputs.build_script_path != '' }}
        working-directory: ${{ inputs.working_directory }}
        env:
          SCRIPT_PATH: ${{ inputs.build_script_path }}
        run: |
          bash "${GITHUB_WORKSPACE}/${SCRIPT_PATH}"

      - name: 🧮 Calculate Directory and Basename
        if: ${{ inputs.local_build_path != '' }}
        id: calc-path
        env:
          LOCAL_BUILD_PATH: ${{ inputs.local_build_path }}
        run: |
          echo "DIR_NAME=$(dirname "${LOCAL_BUILD_PATH}")" >> $GITHUB_OUTPUT
          echo "BASE_NAME=$(basename "${LOCAL_BUILD_PATH}")" >> $GITHUB_OUTPUT

      - name: Deploy signed code to Lambda
        uses: SPHTech-Platform/deploy-actions/action_deploy_lambda@main
        if: ${{ inputs.local_build_path != '' }}
        with:
          aws_account_id: ${{ steps.aws-deploy-credentials.outputs.aws-account-id }}
          aws_region: ${{ inputs.aws_account_region}}
          function_name: ${{ inputs.lambda_function_name }}
          working_directory: ${{ inputs.working_directory }}/${{ steps.calc-path.outputs.DIR_NAME }}
          zipped_file_name: ${{ steps.calc-path.outputs.BASE_NAME }}

      - name: 🔄 Update Lambda Environment Variables
        if: ${{ inputs.lambda_environment_var != '' }}
        working-directory: ${{ inputs.working_directory }}
        shell: bash
        env:
          env_var: ${{ env.env_var }}
          FUNC_NAME: ${{ inputs.lambda_function_name }}
          NEW_VARS: ${{ inputs.lambda_environment_var }}
        run: |
          UPDATED_ENVIRONMNET_VARIABLES=$(aws lambda get-function-configuration --function-name "${FUNC_NAME}" | jq --compact-output ".Environment + {\"Variables\": (.Environment.Variables + {${NEW_VARS}})}")

          aws lambda update-function-configuration --function-name "${FUNC_NAME}" \
          --environment "${UPDATED_ENVIRONMNET_VARIABLES}"

  register_deploy_dx:
    if: ${{ success() || failure() }}
    needs: [deploy-lambda]
    runs-on:
      - platform-eng-ent-v2-dual
    steps:
      - name: Register deployment
        uses: SPHTech-Platform/deploy-actions/register_deploy_dx@v2
        with:
          dx_base_url: ${{ inputs.dx_base_url }}
          dx_api_token: ${{ secrets.DX_API_TOKEN }}
          service: ${{ inputs.dx_service_name }}
          env: ${{ inputs.environment }}
          product_name: ${{ inputs.dx_product_name }}
          app_category: ${{ inputs.dx_app_category }}
        if: ${{ inputs.need_to_register_deployment_to_dx }}
